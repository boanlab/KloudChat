      output_cost_per_token: 0.0000150000    # $15 / 1M

router_settings:
  num_retries: 2
  timeout: 600
  # 같은 model_name 으로 등록된 deployment(=Ollama 노드 여러 대) 간 자동 LB.
  # least-busy = 진행 중 요청 적은 노드 우선 (GPU 부하 분산에 자연).
  routing_strategy: least-busy

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  store_model_in_db: false
  store_prompts_in_spend_logs: true

litellm_settings:
  # Llama 3.x 가 OpenAI tool_calls 대신 `<|python_tag|>{...}` raw text 로 함수 호출을
  # leak 하는 경우를 잡아 tool_calls 로 재구성. /app/callbacks/ 에 마운트된 모듈.
  callbacks: ["callbacks.sanitize_python_tag.sanitizer_instance"]
  drop_params: true
  drop_unsupported_params: true
  request_timeout: 600
  num_retries: 2
  check_provider_endpoint: false
  max_internal_user_budget: 25
  internal_user_budget_duration: "1mo"
  default_key_generate_params:
    max_budget: 10
    budget_duration: "1mo"
  upperbound_key_generate_params:
    max_budget: 9999
    tpm_limit: 100000
    rpm_limit: 500

anthropic_proxy:
  enabled: true
  prefix: /
