router_settings:
  num_retries: 2
  timeout: 600

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  store_model_in_db: false
  store_prompts_in_spend_logs: true

litellm_settings:
  drop_params: true
  drop_unsupported_params: true
  request_timeout: 600
  num_retries: 2
  check_provider_endpoint: false
  max_internal_user_budget: 25
  internal_user_budget_duration: "1mo"
  default_key_generate_params:
    max_budget: 10
    budget_duration: "1mo"
  upperbound_key_generate_params:
    max_budget: 9999
    tpm_limit: 100000
    rpm_limit: 500

anthropic_proxy:
  enabled: true
  prefix: /
