services:
  init-permissions:
    image: busybox:1.36.1
    container_name: init-permissions
    restart: "no"
    volumes:
      - ./librechat/logs:/app/logs
      - ./librechat/uploads:/app/uploads
      - ./librechat/images:/app/images
    command: chown -R 1000:1000 /app/logs /app/uploads /app/images

  librechat:
    container_name: LibreChat
    build:
      context: .
      dockerfile: Dockerfile.librechat
    user: "1000:1000"
    ports:
      - "8080:8080"
    depends_on:
      init-permissions:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      rag_api:
        condition: service_started
      litellm:
        condition: service_healthy
      code-interpreter:
        condition: service_healthy
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - MONGO_URI=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/LibreChat?authSource=admin
      - MEILI_HOST=http://meilisearch:7700
      - RAG_PORT=${RAG_PORT:-8000}
      - RAG_API_URL=http://rag_api:${RAG_PORT:-8000}
      - SEARXNG_INSTANCE_URL=${SEARXNG_INSTANCE_URL}
      - LIBRECHAT_CODE_API_KEY=${CODE_INTERPRETER_API_KEY}
      - LIBRECHAT_CODE_BASEURL=${LIBRECHAT_CODE_BASEURL}
      - HELP_AND_FAQ_URL=${HELP_AND_FAQ_URL:-/}
      - CUSTOM_FOOTER=${CUSTOM_FOOTER:- }
      - WELCOME_BACK_MESSAGE=${WELCOME_BACK_MESSAGE:-}
      - SIGNUP_HEADER=${SIGNUP_HEADER:-}
    entrypoint: ["/usr/local/bin/librechat-entrypoint.sh"]
    command: ["npm", "run", "backend"]
    volumes:
      - type: bind
        source: ./.env
        target: /app/.env
      - type: bind
        source: ./librechat.yaml
        target: /app/librechat.yaml
      - ./scripts/librechat-entrypoint.sh:/usr/local/bin/librechat-entrypoint.sh:ro
      - ./scripts/librechat-patch.py:/usr/local/bin/librechat-patch.py:ro
      - ./librechat/images:/app/client/public/images
      - ./librechat/uploads:/app/uploads
      - ./librechat/logs:/app/logs
      # 브랜딩 자산 — branding/ 파일 교체 후 컨테이너 재시작
      - ./branding/logo.svg:/app/client/dist/assets/logo.svg:ro
      - ./branding/favicon-16x16.png:/app/client/dist/assets/favicon-16x16.png:ro
      - ./branding/favicon-32x32.png:/app/client/dist/assets/favicon-32x32.png:ro
      - ./branding/apple-touch-icon-180x180.png:/app/client/dist/assets/apple-touch-icon-180x180.png:ro
      - ./branding/icon-192x192.png:/app/client/dist/assets/icon-192x192.png:ro
      - ./branding/maskable-icon.png:/app/client/dist/assets/maskable-icon.png:ro
      - ./branding/endpoint-icon.png:/app/client/public/images/endpoint-icon.png:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - kloudchat

  mongodb:
    container_name: chat-mongodb
    image: mongo:8.0.20
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - ./mongodb/data:/data/db
    command: mongod --auth
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - kloudchat

  meilisearch:
    container_name: chat-meilisearch
    image: getmeili/meilisearch:v1.35.1
    restart: always
    environment:
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
    volumes:
      - ./meilisearch/data:/meili_data
    networks:
      - kloudchat

  vectordb:
    container_name: vectordb
    image: pgvector/pgvector:0.8.0-pg15-trixie
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mydatabase}
      POSTGRES_USER: ${POSTGRES_USER:-myuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./rag/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myuser} -d ${POSTGRES_DB:-mydatabase}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kloudchat

  rag_api:
    container_name: rag_api
    build:
      context: .
      dockerfile: Dockerfile.rag
    restart: always
    depends_on:
      vectordb:
        condition: service_healthy
      meilisearch:
        condition: service_started
      litellm:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DB_HOST=vectordb
      - RAG_PORT=${RAG_PORT:-8000}
      - HYBRID_SEARCH=true
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - EMBEDDINGS_PROVIDER=${EMBEDDINGS_PROVIDER:-openai}
      - EMBEDDINGS_MODEL=${EMBEDDINGS_MODEL:-bge-m3}
      - RAG_OPENAI_BASEURL=${RAG_OPENAI_BASEURL:-http://litellm:8000/v1}
      - RAG_OPENAI_API_KEY=${RAG_OPENAI_API_KEY:-}
    env_file:
      - .env
    networks:
      - kloudchat

  litellm-db:
    container_name: litellm-db
    image: postgres:16.13
    restart: always
    environment:
      POSTGRES_USER: ${LITELLM_DB_USER:-litellm}
      POSTGRES_PASSWORD: ${LITELLM_DB_PASSWORD}
      POSTGRES_DB: litellm
    volumes:
      - ./litellm/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LITELLM_DB_USER:-litellm} -d litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kloudchat

  litellm:
    container_name: litellm
    image: ghcr.io/berriai/litellm:v1.83.7-stable
    restart: always
    depends_on:
      litellm-db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
    command:
      [
        "--config", "/app/config.yaml",
        "--port", "8000",
        "--num_workers", "8",
      ]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      DATABASE_URL: "postgres://${LITELLM_DB_USER:-litellm}:${LITELLM_DB_PASSWORD}@litellm-db:5432/litellm"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      LITELLM_LOG: ${LITELLM_LOG:-INFO}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/liveliness')"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - kloudchat

  searxng:
    container_name: searxng
    image: searxng/searxng:2026.4.24-a7ac696b4
    restart: always
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml
    networks:
      - kloudchat

  comfyui-shim:
    container_name: comfyui-shim
    build:
      context: .
      dockerfile: Dockerfile.comfyui-shim
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - COMFYUI_URLS=${COMFYUI_URLS:-http://host.docker.internal:8188}
      - DEFAULT_MODEL=qwen-image
      - LOG_LEVEL=INFO
      - LITELLM_URL=http://litellm:8000
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - kloudchat

  code-interpreter:
    container_name: code-interpreter
    build:
      context: .
      dockerfile: Dockerfile.code-interpreter
    restart: always
    init: true
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined
    environment:
      - REDIS_HOST=code-interpreter-redis
      - REDIS_PORT=6379
      - MINIO_ENDPOINT=code-interpreter-minio:9000
      - MINIO_ACCESS_KEY=${CODE_INTERPRETER_MINIO_USER}
      - MINIO_SECRET_KEY=${CODE_INTERPRETER_MINIO_PASSWORD}
      - MINIO_BUCKET=${CODE_INTERPRETER_MINIO_BUCKET}
      - MINIO_SECURE=false
      - API_KEY=${CODE_INTERPRETER_API_KEY}
      - MAX_EXECUTION_TIME=30
      - MAX_MEMORY_MB=512
      - OPENBLAS_NUM_THREADS=1
      - OMP_NUM_THREADS=1
      - REPL_WARMUP_TIMEOUT_SECONDS=60
      - SANDBOX_POOL_PARALLEL_BATCH=1
    command: >
      sh -c "mkdir -p /app/ssl && python3 -m src.main"
    depends_on:
      code-interpreter-redis:
        condition: service_healthy
      code-interpreter-minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    networks:
      - kloudchat

  code-interpreter-redis:
    container_name: code-interpreter-redis
    image: redis:7.4.8-alpine
    restart: always
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - ./code-interpreter/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kloudchat

  code-interpreter-minio:
    container_name: code-interpreter-minio
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: always
    environment:
      MINIO_ROOT_USER: ${CODE_INTERPRETER_MINIO_USER}
      MINIO_ROOT_PASSWORD: ${CODE_INTERPRETER_MINIO_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - ./code-interpreter/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kloudchat

  code-interpreter-minio-init:
    container_name: code-interpreter-minio-init
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    restart: "no"
    depends_on:
      code-interpreter-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://code-interpreter-minio:9000 $${CODE_INTERPRETER_MINIO_USER} $${CODE_INTERPRETER_MINIO_PASSWORD};
      mc mb --ignore-existing myminio/$${CODE_INTERPRETER_MINIO_BUCKET};
      exit 0;
      "
    environment:
      - CODE_INTERPRETER_MINIO_USER=${CODE_INTERPRETER_MINIO_USER}
      - CODE_INTERPRETER_MINIO_PASSWORD=${CODE_INTERPRETER_MINIO_PASSWORD}
      - CODE_INTERPRETER_MINIO_BUCKET=${CODE_INTERPRETER_MINIO_BUCKET}
    networks:
      - kloudchat

  mcp-permission-guard:
    container_name: mcp-permission-guard
    image: mongo:8.0.20
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGO_ROOT_USER=${MONGO_ROOT_USER}
      - MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      while true; do
        mongosh --host mongodb --quiet --authenticationDatabase admin -u \"$$MONGO_ROOT_USER\" -p \"$$MONGO_ROOT_PASSWORD\" --eval 'db = db.getSiblingDB(\"LibreChat\"); db.roles.updateMany({}, {$$set: {\"permissions.MCP_SERVERS\": {USE:false, CREATE:false, SHARE:false, SHARE_PUBLIC:false}}});' >/dev/null 2>&1;
        sleep 15;
      done
      "
    networks:
      - kloudchat

networks:
  kloudchat:
    driver: bridge
