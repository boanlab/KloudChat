services:
  init-permissions:
    image: busybox:1.36.1
    container_name: init-permissions
    restart: "no"
    volumes:
      - ./data/librechat/logs:/app/logs
      - ./data/librechat/uploads:/app/uploads
      - ./data/librechat/images:/app/images
      - ./data/librechat/uv-cache:/app/uv-cache
    command: chown -R 1000:1000 /app/logs /app/uploads /app/images /app/uv-cache

  librechat:
    container_name: LibreChat
    image: ${KLOUDCHAT_IMAGE_NS:-boanlab}/kloudchat-librechat:${KLOUDCHAT_IMAGE_TAG:-latest}
    user: "1000:1000"
    ports:
      - "8080:8080"
    depends_on:
      init-permissions:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      rag_api:
        condition: service_started
      code-interpreter:
        condition: service_healthy
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - MONGO_URI=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/LibreChat?authSource=admin
      - MEILI_HOST=http://meilisearch:7700
      - RAG_PORT=${RAG_PORT:-8000}
      - RAG_API_URL=http://rag_api:${RAG_PORT:-8000}
      - SEARXNG_INSTANCE_URL=${SEARXNG_INSTANCE_URL}
      - LIBRECHAT_CODE_API_KEY=${CODE_INTERPRETER_API_KEY}
      - LIBRECHAT_CODE_BASEURL=${LIBRECHAT_CODE_BASEURL:-http://code-interpreter:8000}
      # LITELLM_URL: docker-compose.litellm.yml 가 별도 노드면 .env 에서 host:port 로 교체.
      # librechat.yaml 의 baseURL 및 MCP 자식 (youtube/usage) 가 이 값 참조.
      - LITELLM_URL=${LITELLM_URL:-http://host.docker.internal:8000}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      # smart_search MCP 가 pgvector(langchain_pg_embedding)를 직접 질의 — 접속 URL 주입.
      - RAG_DB_URL=postgresql://${POSTGRES_USER:-myuser}:${POSTGRES_PASSWORD}@vectordb:5432/${POSTGRES_DB:-mydatabase}
      # smart_search Phase 2 rerank — bge-reranker 배포 시 그 /rerank endpoint(미설정=스킵).
      - RERANK_URL=${RERANK_URL:-}
      # export_deck MCP — 덱 PDF 다운로드 링크의 절대 base + 렌더 사이드카 주소.
      - DOMAIN_CLIENT=${DOMAIN_CLIENT}
      - SLIDE_EXPORT_URL=${SLIDE_EXPORT_URL:-http://slide-export:8090}
      # generate_video MCP (Video Studio) — comfyui-shim 의 /video/{submit,fetch} 호출.
      - COMFYUI_SHIM_URL=${COMFYUI_SHIM_URL:-http://comfyui-shim:7860}
      # MONGO_URI 는 LibreChat 이 MCP ${} 치환에서 denylist 로 차단(보안) → export_deck
      # MCP 가 대화 아티팩트를 읽도록 비-denylist 이름으로 같은 값 노출.
      - KC_MONGO_URI=mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/LibreChat?authSource=admin
      # paperbanana MCP (학술 다이어그램 생성) 가 OpenRouter 로 VLM/이미지 호출 —
      # mcpServers.paperbanana.env 가 OPENAI_API_KEY 로 이 값을 참조.
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      # crawl4ai-shim 이 firecrawl-호환 endpoint → LibreChat 의 firecrawl client
      # 가 환경변수에서 key 탐색. 실제 인증 없음 — shim 에서 무시.
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-internal-shim-noauth}
      - FIRECRAWL_BASE_URL=${FIRECRAWL_BASE_URL:-http://crawl4ai-shim:8080}
      - HELP_AND_FAQ_URL=${HELP_AND_FAQ_URL:-/}
      # 앱 타이틀(브라우저 탭/로고 alt fallback). /app/.env dotenv 로도 로드되나
      # CUSTOM_FOOTER 처럼 컨테이너 env 에도 명시 → 일관성 유지(셸 env 혼란 방지).
      - APP_TITLE=${APP_TITLE:-KloudChat}
      - CUSTOM_FOOTER=${CUSTOM_FOOTER:- }
      - WELCOME_BACK_MESSAGE=${WELCOME_BACK_MESSAGE:-}
      # MCP 자식 프로세스 전달용 — librechat.yaml 의 ${VAR} 가 컨테이너 env 에서 탐색.
      - WHISPER_URL=${WHISPER_URL:-}
    entrypoint: ["/usr/local/bin/librechat-entrypoint.sh"]
    command: ["npm", "run", "backend"]
    volumes:
      - type: bind
        source: ./.env
        target: /app/.env
      - type: bind
        source: ./librechat.yaml
        target: /app/librechat.yaml
      - ./scripts/librechat-entrypoint.sh:/usr/local/bin/librechat-entrypoint.sh:ro
      - ./scripts/librechat-patch.py:/usr/local/bin/librechat-patch.py:ro
      - ./mcp:/app/mcp:ro
      - ./data/librechat/images:/app/client/public/images
      - ./data/librechat/uploads:/app/uploads
      - ./data/librechat/logs:/app/logs
      # MCP 의 uvx/uv 패키지 캐시 — fetch/time/youtube/usage 등의 의존성 재설치 회피.
      - ./data/librechat/uv-cache:/home/node/.cache/uv
      # 브랜딩 자산 — branding/ 파일 교체 후 컨테이너 재시작 필요.
      - ./branding/logo.svg:/app/client/dist/assets/logo.svg:ro
      - ./branding/favicon-16x16.png:/app/client/dist/assets/favicon-16x16.png:ro
      - ./branding/favicon-32x32.png:/app/client/dist/assets/favicon-32x32.png:ro
      - ./branding/apple-touch-icon-180x180.png:/app/client/dist/assets/apple-touch-icon-180x180.png:ro
      - ./branding/icon-192x192.png:/app/client/dist/assets/icon-192x192.png:ro
      - ./branding/maskable-icon.png:/app/client/dist/assets/maskable-icon.png:ro
      - ./branding/endpoint-icon.png:/app/client/public/images/endpoint-icon.png:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - kloudchat

  mongodb:
    container_name: chat-mongodb
    image: mongo:8.0.20
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - ./data/mongodb:/data/db
    tmpfs:
      - /data/configdb
    command: mongod --auth
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - kloudchat

  meilisearch:
    container_name: chat-meilisearch
    image: getmeili/meilisearch:v1.35.1
    restart: always
    environment:
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
    volumes:
      - ./data/meilisearch:/meili_data
    networks:
      - kloudchat

  vectordb:
    container_name: vectordb
    image: pgvector/pgvector:0.8.0-pg15-trixie
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mydatabase}
      POSTGRES_USER: ${POSTGRES_USER:-myuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/rag/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myuser} -d ${POSTGRES_DB:-mydatabase}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kloudchat

  rag_api:
    container_name: rag_api
    image: ${KLOUDCHAT_IMAGE_NS:-boanlab}/kloudchat-rag-api:${KLOUDCHAT_IMAGE_TAG:-latest}
    restart: always
    depends_on:
      vectordb:
        condition: service_healthy
      meilisearch:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DB_HOST=vectordb
      - RAG_PORT=${RAG_PORT:-8000}
      - HYBRID_SEARCH=true
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - EMBEDDINGS_PROVIDER=${EMBEDDINGS_PROVIDER:-openai}
      - EMBEDDINGS_MODEL=${EMBEDDINGS_MODEL:-bge-m3}
      # RAG_OPENAI_BASEURL = LITELLM_URL/v1. LiteLLM stack 이 별도 노드면 .env 의
      # LITELLM_URL 만 갱신해도 여기까지 자동 반영 (env_file 의 stale 값은 이
      # environment 블록이 override).
      - RAG_OPENAI_BASEURL=${LITELLM_URL:-http://host.docker.internal:8000}/v1
      - RAG_OPENAI_API_KEY=${RAG_OPENAI_API_KEY:-}
    env_file:
      - .env
    networks:
      - kloudchat

  # LiteLLM stack (litellm / litellm-db / super-agent-shim) 정의는 docker-compose.litellm.yml.
  # 여기서는 .env 의 LITELLM_URL 로만 호출 (cross-stack endpoint).

  valkey:
    # SearXNG 의 shared state 백엔드 (settings.yml 의 valkey.url 로 연결, 워커 4개 공유).
    # 현재 limiter 는 settings 에서 off — 켜면(limiter:true) bot/rate-limit 카운터가
    # 여기 적재. persistence off + tmpfs /data → 컨테이너 재시작 시 상태 0 부터
    # (운영상 OK — 휘발성 캐시).
    container_name: valkey
    image: valkey/valkey:8-alpine
    restart: always
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    tmpfs:
      - /data
    networks:
      - kloudchat

  searxng:
    container_name: searxng
    image: searxng/searxng:2026.4.24-a7ac696b4
    restart: always
    environment:
      # 검색 fan-out (Google/DDG/학술 엔진 동시) 처리용 granian 워커 수.
      - GRANIAN_WORKERS=4
    depends_on:
      - valkey
    volumes:
      - ./searxng:/etc/searxng
    tmpfs:
      - /var/cache/searxng
    networks:
      - kloudchat

  comfyui-shim:
    container_name: comfyui-shim
    image: ${KLOUDCHAT_IMAGE_NS:-boanlab}/kloudchat-comfyui-shim:${KLOUDCHAT_IMAGE_TAG:-latest}
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # 빈 값은 빈 채로 전달 — :- 기본을 넣으면 OR 전용(GPU 없는) 배포에서 phantom
      # backend 발생 → shim 의 'backend 없음 → 503' 분기 무력화, 요청 행(hang).
      - COMFYUI_URLS=${COMFYUI_URLS:-}
      # DEFAULT_MODEL 미주입 — shim 이 backend 유무로 결정
      # (ComfyUI 있으면 flux-schnell, 없으면 외부 nano-banana).
      - LOG_LEVEL=INFO
      # 외부 image-gen alias (nano-banana / gpt-image-2 등) 가 LiteLLM 의
      # chat/completions 로 OpenRouter image-route 호출 시 사용.
      - LITELLM_URL=${LITELLM_URL:-http://litellm:8000}
      # 외부 이미지(nano-banana 등)와 Video Studio 비디오(Veo/Sora) 모두 LiteLLM 경유.
      # 비디오는 LiteLLM 의 OpenRouter passthrough(/openrouter/api/v1/videos) 로 포워딩.
      - LITELLM_API_KEY=${LITELLM_MASTER_KEY:-}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - kloudchat
      - litellm      # LiteLLM 이 /billsink(로컬 미디어 명목 과금) 도달용.

  crawl4ai-shim:
    # Firecrawl-호환 scrape endpoint (Crawl4AI 백엔드). LibreChat web_search 가
    # firecrawlApiUrl 로 지목 — 외부 Firecrawl Cloud 회피 (KloudChat 정책: 검색
    # query 외부 미전송).
    container_name: crawl4ai-shim
    image: ${KLOUDCHAT_IMAGE_NS:-boanlab}/kloudchat-crawl4ai-shim:${KLOUDCHAT_IMAGE_TAG:-latest}
    restart: always
    environment:
      - LOG_LEVEL=INFO
      - DEFAULT_TIMEOUT_MS=30000
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - kloudchat

  whisper-shim:
    container_name: whisper-shim
    image: ${KLOUDCHAT_IMAGE_NS:-boanlab}/kloudchat-whisper-shim:${KLOUDCHAT_IMAGE_TAG:-latest}
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # 호스트별 whisper systemd (install-whisper.sh) 들의 URL 목록. 콤마 구분.
      # 1개면 단일 노드, 2+ 면 inflight 기준 라우팅.
      - WHISPER_URLS=${WHISPER_URLS:-}
      # 긴 회의 녹음(Note Taker) 전사 대비 — 기본 900s(15분) → 3600s(1시간).
      - TRANSCRIBE_TIMEOUT_SEC=${TRANSCRIBE_TIMEOUT_SEC:-3600}
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - kloudchat

  code-interpreter:
    container_name: code-interpreter
    image: ${KLOUDCHAT_IMAGE_NS:-boanlab}/kloudchat-code-interpreter:${KLOUDCHAT_IMAGE_TAG:-latest}
    restart: always
    init: true
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
      - seccomp:unconfined
    environment:
      - REDIS_HOST=code-interpreter-redis
      - REDIS_PORT=6379
      - S3_ENDPOINT=code-interpreter-minio:9000
      - S3_ACCESS_KEY=${CODE_INTERPRETER_MINIO_USER}
      - S3_SECRET_KEY=${CODE_INTERPRETER_MINIO_PASSWORD}
      - S3_BUCKET=${CODE_INTERPRETER_MINIO_BUCKET}
      - S3_SECURE=false
      - S3_REGION=us-east-1
      - API_KEY=${CODE_INTERPRETER_API_KEY}
      - MAX_EXECUTION_TIME=30
      - MAX_MEMORY_MB=512
      - OPENBLAS_NUM_THREADS=1
      - OMP_NUM_THREADS=1
      - REPL_WARMUP_TIMEOUT_SECONDS=60
      - SANDBOX_POOL_PARALLEL_BATCH=1
    command: >
      sh -c "mkdir -p /app/ssl && python3 -m src.main"
    depends_on:
      code-interpreter-redis:
        condition: service_healthy
      code-interpreter-minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    networks:
      - kloudchat

  code-interpreter-redis:
    container_name: code-interpreter-redis
    image: redis:7.4.8-alpine
    restart: always
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - ./data/code-interpreter/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kloudchat

  code-interpreter-minio:
    container_name: code-interpreter-minio
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: always
    environment:
      MINIO_ROOT_USER: ${CODE_INTERPRETER_MINIO_USER}
      MINIO_ROOT_PASSWORD: ${CODE_INTERPRETER_MINIO_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - ./data/code-interpreter/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kloudchat

  code-interpreter-minio-init:
    container_name: code-interpreter-minio-init
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    restart: "no"
    depends_on:
      code-interpreter-minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://code-interpreter-minio:9000 $${CODE_INTERPRETER_MINIO_USER} $${CODE_INTERPRETER_MINIO_PASSWORD};
      mc mb --ignore-existing myminio/$${CODE_INTERPRETER_MINIO_BUCKET};
      exit 0;
      "
    environment:
      - CODE_INTERPRETER_MINIO_USER=${CODE_INTERPRETER_MINIO_USER}
      - CODE_INTERPRETER_MINIO_PASSWORD=${CODE_INTERPRETER_MINIO_PASSWORD}
      - CODE_INTERPRETER_MINIO_BUCKET=${CODE_INTERPRETER_MINIO_BUCKET}
    networks:
      - kloudchat

  deep-research:
    container_name: deep-research
    image: ${KLOUDCHAT_IMAGE_NS:-boanlab}/kloudchat-deep-research:${KLOUDCHAT_IMAGE_TAG:-latest}
    restart: always
    depends_on:
      searxng:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # LDR env = LDR_ + key (dot→underscore, UPPER). LiteLLM 은 openai_endpoint provider.
      LDR_LLM_PROVIDER: openai_endpoint
      # Deep Research reasoning 모델 — plain canonical alias. 클러스터가 122b 를
      # 128K ctx 로 서빙 → plain alias 로 충분.
      LDR_LLM_MODEL: local/qwen3.5:122b
      LDR_LLM_OPENAI_ENDPOINT_API_KEY: ${LITELLM_MASTER_KEY}
      LDR_LLM_OPENAI_ENDPOINT_URL: ${LITELLM_URL:-http://host.docker.internal:8000}/v1
      # SearXNG science 탭 (arxiv+scholar+openalex+crossref+pubmed) 으로 학술+web 일괄.
      LDR_SEARCH_TOOL: searxng
      LDR_SEARCH_ENGINE_WEB_SEARXNG_DEFAULT_PARAMS_INSTANCE_URL: http://searxng:8080
      # 122b 의 verbose 질문 생성 경향 — iteration 2 / question 1 로 제약 (~5분 내 종료).
      LDR_SEARCH_ITERATIONS: "2"
      LDR_SEARCH_QUESTIONS_PER_ITERATION: "1"
    networks:
      - kloudchat

  mcp-permission-guard:
    # roles.permissions.MCP_SERVERS 를 15s 마다 false 강제 — DB 변조 시 자동 복구.
    container_name: mcp-permission-guard
    image: mongo:8.0.20
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    tmpfs:
      - /data/db
      - /data/configdb
    environment:
      - MONGO_ROOT_USER=${MONGO_ROOT_USER}
      - MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      while true; do
        mongosh --host mongodb --quiet --authenticationDatabase admin -u \"$$MONGO_ROOT_USER\" -p \"$$MONGO_ROOT_PASSWORD\" --eval 'db = db.getSiblingDB(\"LibreChat\"); db.roles.updateMany({}, {$$set: {\"permissions.MCP_SERVERS\": {USE:false, CREATE:false, SHARE:false, SHARE_PUBLIC:false}}});' >/dev/null 2>&1;
        sleep 15;
      done
      "
    networks:
      - kloudchat

  # Slide Studio HTML 덱 → 16:9 다중페이지 PDF/PPTX 렌더 (headless chromium).
  # opt-in: `docker compose --profile slide-export up -d slide-export`.
  # export_deck MCP 로 연결됨 (librechat.yaml, startup:false) — docs/user/slide-export.md 참고.
  slide-export:
    container_name: slide-export
    profiles: ["slide-export"]
    image: ${KLOUDCHAT_IMAGE_NS:-boanlab}/kloudchat-slide-export:${KLOUDCHAT_IMAGE_TAG:-latest}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8090/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - kloudchat

networks:
  kloudchat:
    driver: bridge
  # litellm 은 별도 compose 스택(다른 네트워크). comfyui-shim 이 로컬 미디어 명목 과금을
  # LiteLLM passthrough(/localbill)로 기록 시, LiteLLM 이 그 target(/billsink) 도달하려면
  # 같은 네트워크 필요. litellm 스택 네트워크를 external 로 끌어와 공유.
  litellm:
    external: true
    name: kloudchat-litellm_kloudchat-litellm
