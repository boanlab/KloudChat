# Linux + amd64 + NVIDIA GPU 전용 서비스.
# CUDA 컨테이너가 amd64-only 인 컴포넌트만 여기에 둡니다 (Whisper STT).
# ComfyUI / shim 은 arm64 도 지원하므로 docker-compose.gpu.yml 에 있습니다.
#
# 사용:  ./scripts/deploy.sh up -d   (deploy.sh 가 자동으로 -f 옵션 조합)
# 직접:  docker compose -f docker-compose.yml -f docker-compose.gpu.yml -f docker-compose.amd64.yml up -d

services:
  # ============================================
  # Whisper (STT) — fedirz/faster-whisper-server (CTranslate2 기반, OpenAI Audio API 호환)
  # latest-cuda 태그가 amd64-only 이라 이 파일에 위치.
  # ============================================
  whisper:
    container_name: whisper
    image: fedirz/faster-whisper-server:latest-cuda
    restart: always
    environment:
      WHISPER__MODEL: Systran/faster-whisper-large-v3
      WHISPER__INFERENCE_DEVICE: auto
      UVICORN_PORT: "8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - kloudchat
