version: 1.3.9
cache: true

# ==============================================
# 웹 검색
# ==============================================
webSearch:
  searchProvider: "searxng"
  searxngInstanceUrl: "${SEARXNG_INSTANCE_URL}"
  safeSearch: 1

# ==============================================
# 엔드포인트
# ==============================================
endpoints:
  custom:
    - name: "LiteLLM"
      apiKey: "user_provided"
      userProvide: true
      baseURL: "http://litellm:8000/v1"
      # 사용자별 키 입력 1회 후 fetch 가 정상 동작하지만, 입력 전에도 모델 드롭다운이 비지 않도록
      # 5개 모델을 default 로 명시 (LibreChat 가 fetch 실패 시 이 목록을 사용).
      models:
        default:
          - "ollama/qwen3.5:9b"
          - "ollama/qwen3.5:35b"
          - "ollama/gemma3:27b"
          - "ollama/qwen3-coder-next:q4_K_M"
          - "ollama/qwen3-coder-next:q8_0"
        fetch: true
      titleConvo: true
      titleModel: "ollama/qwen3.5:9b"
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "KloudChat"
      iconURL: "https://ollama.com/public/ollama.png"

# ==============================================
# 인터페이스 설정
# ==============================================
# 자체 회원가입(UI Sign Up) 을 특정 이메일 도메인으로 제한하려면 다음 섹션 주석 해제 후 도메인 명시.
# 관리자가 manage.sh user create 로 만든 사용자는 이 제한을 우회하므로,
# CLI 만 쓸 거면 섹션 자체를 두지 않아도 됨 (현재 상태).
# registration:
#   allowedDomains:
#     - "your-domain.com"

interface:
  modelSelect: true
  parameters: true
  presets: true
  prompts: true
  bookmarks: true
  multiConvo: true
  temporaryChat: true
  runCode: true
  webSearch: true
  fileSearch: true
  fileCitations: true
  agents:
    USE: true
    CREATE: true
    SHARE: false
    SHARE_PUBLIC: false
  mcpServers:
    USE: false
    CREATE: false
    SHARE: false
    SHARE_PUBLIC: false

# ==============================================
# 파일 설정
# ==============================================
fileConfig:
  serverFileSizeLimit: 200
  avatarSizeLimit: 4
  endpoints:
    default:
      fileLimit: 10
      fileSizeLimit: 100
    agents:
      fileLimit: 10
      fileSizeLimit: 100

# ==============================================
# 음성 (TTS / STT)
# ==============================================
speech:
  stt:
    openai:
      url: "http://whisper:8000/v1/audio/transcriptions"
      apiKey: "dummy"
      model: "Systran/faster-whisper-large-v3"
  tts:
    openai:
      url: "http://tts:8000/v1/audio/speech"
      apiKey: "dummy"
      model: "tts-1-hd"
      voices:
        - "korean"           # xtts_v2 한국어 (자연스러운 한국어 발화)
        - "korean-female"    # xtts_v2 한국어 (다른 톤)
        - "english-hd"       # xtts_v2 영어 (음질 우수)
        - "alloy"            # piper 영어 (빠름)
        - "nova"             # piper 영어 (빠름)
        - "shimmer"          # piper 영어 (빠름)

# ==============================================
# 속도 제한
# ==============================================
rateLimits:
  fileUploads:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60
  conversationsImport:
    ipMax: 40
    ipWindowInMinutes: 60
    userMax: 25
    userWindowInMinutes: 60
