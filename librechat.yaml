version: 1.3.9
cache: true

webSearch:
  searchProvider: "searxng"
  searxngInstanceUrl: "${SEARXNG_INSTANCE_URL}"
  safeSearch: 1

endpoints:
  agents:
    disableBuilder: true
    # 비 ephemeral agent (DB-backed) 의 경우 resolveAgentCapabilities 가 default 폴백을 안 함.
    # 명시 안 하면 tools/file_search/execute_code/web_search 등 전부 차단됨.
    capabilities:
      - "execute_code"
      - "file_search"
      - "web_search"
      - "actions"
      - "tools"
      - "artifacts"
      - "context"
      - "chain"
      - "ocr"
  custom:
    - name: "LiteLLM"
      apiKey: "user_provided"
      userProvide: true
      baseURL: "http://litellm:8000/v1"
      models:
        default:
          # >>> KLOUDCHAT_MODELS_START
          - "openai/gpt-5.5"
          - "openai/gpt-5"
          - "openai/gpt-5-mini"
          - "openai/gpt-5-nano"
          - "anthropic/claude-opus-4.7"
          - "anthropic/claude-opus-4.6"
          - "anthropic/claude-sonnet-4.6"
          - "anthropic/claude-haiku-4.5"
          - "google/gemini-3.1-pro-preview"
          - "google/gemini-2.5-pro"
          - "google/gemini-2.5-flash"
          - "ollama/qwen3.5:9b"
          - "ollama/qwen3.6:35b"
          - "ollama/llama3.1:8b"
          - "ollama/llama3.3:70b"
          - "ollama/nemotron3:33b"
          - "ollama/qwen3-coder-next:q8_0"
          # <<< KLOUDCHAT_MODELS_END
        fetch: false
      titleConvo: true
      titleModel: "ollama/qwen3.5:9b"
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "KloudChat"
      iconURL: "/images/endpoint-icon.png"

interface:
  customWelcome: " "
  modelSelect: true
  parameters: true
  presets: true
  prompts: false
  bookmarks: true
  multiConvo: true
  temporaryChat: true
  runCode: true
  webSearch: true
  fileSearch: true
  fileCitations: true
  agents:
    USE: true
    CREATE: true
    SHARE: false
    SHARE_PUBLIC: false
  marketplace:
    use: false
  mcpServers:
    USE: false
    CREATE: false
    SHARE: false
    SHARE_PUBLIC: false

fileConfig:
  serverFileSizeLimit: 200
  avatarSizeLimit: 4
  endpoints:
    default:
      fileLimit: 10
      fileSizeLimit: 100
      supportedMimeTypes:
        - "^[\\w.-]+/[\\w.-]+$"
        - "^application/x-hwp$"
        - "^application/vnd\\.hancom\\.hwp$"
        - "^application/haansofthwp$"
    agents:
      fileLimit: 10
      fileSizeLimit: 100
      supportedMimeTypes:
        - "^[\\w.-]+/[\\w.-]+$"
        - "^application/x-hwp$"
        - "^application/vnd\\.hancom\\.hwp$"
        - "^application/haansofthwp$"

rateLimits:
  fileUploads:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60
  conversationsImport:
    ipMax: 40
    ipWindowInMinutes: 60
    userMax: 25
    userWindowInMinutes: 60
