version: 1.3.9
cache: true

webSearch:
  searchProvider: "searxng"
  searxngInstanceUrl: "${SEARXNG_INSTANCE_URL}"
  safeSearch: 1

endpoints:
  agents:
    disableBuilder: true
  custom:
    - name: "LiteLLM"
      apiKey: "user_provided"
      userProvide: true
      baseURL: "http://litellm:8000/v1"
      models:
        default:
          # >>> KLOUDCHAT_MODELS_START
          - "ollama/qwen3.5:9b"
          - "ollama/qwen3.5:35b"
          - "ollama/gemma4:26b"
          - "openai/gpt-oss:20b"
          - "openai/gpt-oss:120b"
          - "anthropic/claude-opus-4.7"
          - "anthropic/claude-opus-4.6"
          - "anthropic/claude-sonnet-4.6"
          - "openai/gpt-5.5"
          # <<< KLOUDCHAT_MODELS_END
        fetch: false
      titleConvo: true
      titleModel: "ollama/qwen3.5:9b"
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "KloudChat"
      iconURL: "https://ollama.com/public/ollama.png"

interface:
  modelSelect: true
  parameters: true
  presets: true
  prompts: false
  bookmarks: true
  multiConvo: true
  temporaryChat: true
  runCode: true
  webSearch: true
  fileSearch: true
  fileCitations: true
  agents:
    USE: true
    CREATE: true
    SHARE: false
    SHARE_PUBLIC: false
  marketplace:
    use: false
  mcpServers:
    USE: false
    CREATE: false
    SHARE: false
    SHARE_PUBLIC: false

fileConfig:
  serverFileSizeLimit: 200
  avatarSizeLimit: 4
  endpoints:
    default:
      fileLimit: 10
      fileSizeLimit: 100
      supportedMimeTypes:
        - "^[\\w.-]+/[\\w.-]+$"
        - "^application/x-hwp$"
        - "^application/vnd\\.hancom\\.hwp$"
        - "^application/haansofthwp$"
    agents:
      fileLimit: 10
      fileSizeLimit: 100
      supportedMimeTypes:
        - "^[\\w.-]+/[\\w.-]+$"
        - "^application/x-hwp$"
        - "^application/vnd\\.hancom\\.hwp$"
        - "^application/haansofthwp$"

rateLimits:
  fileUploads:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60
  conversationsImport:
    ipMax: 40
    ipWindowInMinutes: 60
    userMax: 25
    userWindowInMinutes: 60
