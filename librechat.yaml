version: 1.3.9
cache: true

webSearch:
  searchProvider: "searxng"
  searxngInstanceUrl: "${SEARXNG_INSTANCE_URL}"
  safeSearch: 1

# MCP HTTP/SSE 사이드카 컨테이너의 internal hostname allowlist.
# 미설정 시 SSRF 보호로 internal hostname (예: ldr, container 이름) 자동 차단됨.
# 매칭은 호스트명 기준이라 포트는 생략. stdio MCP 는 영향 없음 (항상 허용).
mcpSettings:
  allowedDomains:
    - deep-research

# MCP (Model Context Protocol) 서버. 대부분 stdio (LibreChat 가 자식 프로세스로 spawn,
# 첫 호출 시 uvx 가 패키지 자동 다운로드 후 ~/.cache 캐시). deep_research 만 별도
# 사이드카 컨테이너의 streamable-http endpoint.
# agent.tools 에 'sys__all__sys_mcp_<servername>' 추가하면 그 서버의 모든 tool 노출.
mcpServers:
  fetch_url:
    type: stdio
    command: uvx
    args:
      - mcp-server-fetch
  time:
    # 현재 시간 / 타임존 변환. 모델이 "오늘" 환각 방지용.
    type: stdio
    command: uvx
    args:
      - mcp-server-time
      - --local-timezone=Asia/Seoul
  math:
    # sympy 기반 심볼릭/수치 수학 (미적분, 방정식, 행렬, 단위 변환 등). 173 tools.
    # 작은 모델 (≤10B 활성 param) 한테는 context 부담 → math_basic 으로 분리.
    type: stdio
    command: uvx
    args:
      - mcp-sympy
  math_basic:
    # 사칙연산 + power/sqrt/sum/product/compare 등 16 tools (mcp-server-math).
    # 작은 모델용 — sympy 173 tools 의 schema/선택 부담을 피하기 위함.
    type: stdio
    command: uvx
    args:
      - mcp-server-math
  youtube:
    # YouTube 영상 텍스트 추출. 자막 있으면 youtube-transcript-api 즉시 반환,
    # 없으면 yt-dlp 로 audio 추출 + whisper-shim (→ WHISPER_URLS 호스트 systemd → OR 폴백).
    # WHISPER_URL 미설정/shim 미가용이면 LiteLLM 의 whisper-1 (OR 경유) 사용.
    # whisper 첫 호출 시 모델 로드 (large-v3 ~3 GB) 가 30-60초 걸리므로 timeout 넉넉히.
    type: stdio
    timeout: 900000
    command: uv
    args:
      - run
      - --script
      - /app/mcp/youtube.py
    env:
      WHISPER_URL: "${WHISPER_URL}"
      LITELLM_URL: "http://litellm:8000"
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY}"
      WHISPER_OR_MODEL: "${WHISPER_OR_MODEL}"
  usage:
    # 사용자 본인의 LiteLLM 사용량/예산 조회. tools: my_usage(months_back), budget_status().
    # uv run --script 로 inline-deps 스크립트 실행 (mcp + httpx 자동 설치).
    # startup: false — app-level init 건너뛰고 user-scoped 연결만 만듦.
    # 그래야 {{LIBRECHAT_USER_EMAIL}} 가 호출자별로 치환됨 (app 단계엔 user 객체 없음).
    type: stdio
    startup: false
    command: uv
    args:
      - run
      - --script
      - /app/mcp/usage.py
    env:
      LITELLM_URL: "http://litellm:8000"
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY}"
      LIBRECHAT_USER_EMAIL: "{{LIBRECHAT_USER_EMAIL}}"
  deep_research:
    # Local Deep Research — ReAct strategy multi-source 검색 + iterative reasoning, 8 tools.
    # LibreChat 컨테이너가 alpine/musl 이라 playwright wheel 호환 안 됨 → 사이드카(deep-research 서비스, debian)
    # 에서 ldr-mcp 를 mcp-proxy 로 streamable-http wrap. LiteLLM 경유로 ollama/qwen3.6:35b 호출.
    # 검색 엔진은 KloudChat 의 searxng (env SEARXNG_INSTANCE).
    type: streamable-http
    url: http://deep-research:8081/mcp
    startup: false
    timeout: 300000

endpoints:
  agents:
    disableBuilder: true
    # DB-backed agent 의 도구 사용 허용 목록. patch_librechat_agent_capabilities.js
    # 가 ephemeral 한정 폴백을 풀어서 이 목록이 모든 agent 에 적용됨.
    capabilities:
      - "execute_code"
      - "file_search"
      - "web_search"
      - "actions"
      - "tools"
      - "artifacts"
      - "context"
      - "chain"
      - "ocr"
  custom:
    - name: "LiteLLM"
      apiKey: "user_provided"
      userProvide: true
      baseURL: "http://litellm:8000/v1"
      models:
        default:
          # >>> KLOUDCHAT_MODELS_START
          - "openai/gpt-5.5"
          - "openai/gpt-5"
          - "openai/gpt-5-mini"
          - "openai/gpt-5-nano"
          - "anthropic/claude-opus-4.7"
          - "anthropic/claude-opus-4.6"
          - "anthropic/claude-sonnet-4.6"
          - "anthropic/claude-haiku-4.5"
          - "google/gemini-3.1-pro-preview"
          - "google/gemini-2.5-pro"
          - "google/gemini-2.5-flash"
          - "ollama/qwen3.5:9b"
          - "ollama/qwen3.6:35b"
          - "ollama/llama3.1:8b"
          - "ollama/llama3.3:70b"
          - "ollama/nemotron3:33b"
          - "ollama/qwen3-coder-next:q8_0"
          # <<< KLOUDCHAT_MODELS_END
        fetch: false
      titleConvo: true
      titleModel: "ollama/qwen3.5:9b"
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "KloudChat"
      iconURL: "/images/endpoint-icon.png"

interface:
  modelSelect: true
  parameters: true
  presets: true
  prompts: false
  bookmarks: true
  multiConvo: true
  temporaryChat: true
  runCode: true
  webSearch: true
  fileSearch: true
  fileCitations: true
  agents:
    USE: true
    CREATE: true
    SHARE: false
    SHARE_PUBLIC: false
  marketplace:
    use: false
  mcpServers:
    USE: true
    CREATE: false
    SHARE: false
    SHARE_PUBLIC: false

fileConfig:
  serverFileSizeLimit: 200
  avatarSizeLimit: 4
  endpoints:
    default:
      fileLimit: 10
      fileSizeLimit: 100
      supportedMimeTypes:
        - "^[\\w.-]+/[\\w.-]+$"
        - "^application/x-hwp$"
        - "^application/vnd\\.hancom\\.hwp$"
        - "^application/haansofthwp$"
    agents:
      fileLimit: 10
      fileSizeLimit: 100
      supportedMimeTypes:
        - "^[\\w.-]+/[\\w.-]+$"
        - "^application/x-hwp$"
        - "^application/vnd\\.hancom\\.hwp$"
        - "^application/haansofthwp$"

rateLimits:
  fileUploads:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60
  conversationsImport:
    ipMax: 40
    ipWindowInMinutes: 60
    userMax: 25
    userWindowInMinutes: 60
