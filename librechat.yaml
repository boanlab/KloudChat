version: 1.3.9
cache: true

webSearch:
  searchProvider: "searxng"
  searxngInstanceUrl: "${SEARXNG_INSTANCE_URL}"
  safeSearch: 1

# MCP (Model Context Protocol) 서버. LibreChat 가 stdio 로 자식 프로세스 spawn,
# 첫 호출 시 uvx 가 패키지 자동 다운로드 (~/.cache 캐시 후 재호출 빠름).
# agent.tools 에 'sys__all__sys_mcp_<servername>' 추가하면 그 서버의 모든 tool 노출.
mcpServers:
  fetch_url:
    type: stdio
    command: uvx
    args:
      - mcp-server-fetch
  time:
    # 현재 시간 / 타임존 변환. 모델이 "오늘" 환각 방지용.
    type: stdio
    command: uvx
    args:
      - mcp-server-time
      - --local-timezone=Asia/Seoul
  math:
    # sympy 기반 심볼릭/수치 수학 (미적분, 방정식, 행렬, 단위 변환 등). 173 tools.
    # 작은 모델 (≤10B 활성 param) 한테는 context 부담 → calculator 로 분리.
    type: stdio
    command: uvx
    args:
      - mcp-sympy
  calculator:
    # 사칙연산 + power/sqrt/sum/product/compare 등 16 tools (mcp-server-math).
    # 작은 모델용 — sympy 173 tools 의 schema/선택 부담을 피하기 위함.
    type: stdio
    command: uvx
    args:
      - mcp-server-math
  semantic_scholar:
    # Semantic Scholar 학술 검색 (200M+ 논문, 인용 그래프, 저자). 33 tools.
    # API 키 없으면 공용 IP rate limit (1 req/sec) — multi-user 환경에선 빠듯할 수 있음.
    # 키 필요 시 https://www.semanticscholar.org/product/api 에서 발급 후
    # env 에 SEMANTIC_SCHOLAR_API_KEY: "${SEMANTIC_SCHOLAR_API_KEY}" 추가.
    type: stdio
    command: uvx
    args:
      - semantic-scholar-mcp
  arxiv:
    # arxiv.org public API 직접 호출 — 키 불필요. 8 tools.
    # search_papers / download_paper (PDF/HTML → markdown) / read_paper /
    # list_papers / semantic_search (로컬 컬렉션) / citation_graph / watch_topic / check_alerts.
    # 다운로드 캐시: 컨테이너 내부 ~/.arxiv-mcp-server/papers (재시작 시 휘발).
    # 영구 보관 필요하면 host bind 추가 + --storage-path 인자.
    type: stdio
    command: uvx
    args:
      - arxiv-mcp-server
  litellm_usage:
    # 사용자 본인의 LiteLLM 사용량/예산 조회. tools: my_usage(days), budget_status().
    # uv run --script 로 inline-deps 스크립트 실행 (mcp + httpx 자동 설치).
    # startup: false — app-level init 건너뛰고 user-scoped 연결만 만듦.
    # 그래야 {{LIBRECHAT_USER_EMAIL}} 가 호출자별로 치환됨 (app 단계엔 user 객체 없음).
    type: stdio
    startup: false
    command: uv
    args:
      - run
      - --script
      - /app/mcp/litellm_usage.py
    env:
      LITELLM_URL: "http://litellm:8000"
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY}"
      LIBRECHAT_USER_EMAIL: "{{LIBRECHAT_USER_EMAIL}}"

endpoints:
  agents:
    disableBuilder: true
    # 비 ephemeral agent (DB-backed) 의 경우 resolveAgentCapabilities 가 default 폴백을 안 함.
    # 명시 안 하면 tools/file_search/execute_code/web_search 등 전부 차단됨.
    capabilities:
      - "execute_code"
      - "file_search"
      - "web_search"
      - "actions"
      - "tools"
      - "artifacts"
      - "context"
      - "chain"
      - "ocr"
  custom:
    - name: "LiteLLM"
      apiKey: "user_provided"
      userProvide: true
      baseURL: "http://litellm:8000/v1"
      models:
        default:
          # >>> KLOUDCHAT_MODELS_START
          - "openai/gpt-5.5"
          - "openai/gpt-5"
          - "openai/gpt-5-mini"
          - "openai/gpt-5-nano"
          - "anthropic/claude-opus-4.7"
          - "anthropic/claude-opus-4.6"
          - "anthropic/claude-sonnet-4.6"
          - "anthropic/claude-haiku-4.5"
          - "google/gemini-3.1-pro-preview"
          - "google/gemini-2.5-pro"
          - "google/gemini-2.5-flash"
          - "ollama/qwen3.5:9b"
          - "ollama/qwen3.6:35b"
          - "ollama/llama3.1:8b"
          - "ollama/llama3.3:70b"
          - "ollama/nemotron3:33b"
          - "ollama/qwen3-coder-next:q8_0"
          # <<< KLOUDCHAT_MODELS_END
        fetch: false
      titleConvo: true
      titleModel: "ollama/qwen3.5:9b"
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "KloudChat"
      iconURL: "/images/endpoint-icon.png"

interface:
  customWelcome: " "
  modelSelect: true
  parameters: true
  presets: true
  prompts: false
  bookmarks: true
  multiConvo: true
  temporaryChat: true
  runCode: true
  webSearch: true
  fileSearch: true
  fileCitations: true
  agents:
    USE: true
    CREATE: true
    SHARE: false
    SHARE_PUBLIC: false
  marketplace:
    use: false
  mcpServers:
    USE: true
    CREATE: false
    SHARE: false
    SHARE_PUBLIC: false

fileConfig:
  serverFileSizeLimit: 200
  avatarSizeLimit: 4
  endpoints:
    default:
      fileLimit: 10
      fileSizeLimit: 100
      supportedMimeTypes:
        - "^[\\w.-]+/[\\w.-]+$"
        - "^application/x-hwp$"
        - "^application/vnd\\.hancom\\.hwp$"
        - "^application/haansofthwp$"
    agents:
      fileLimit: 10
      fileSizeLimit: 100
      supportedMimeTypes:
        - "^[\\w.-]+/[\\w.-]+$"
        - "^application/x-hwp$"
        - "^application/vnd\\.hancom\\.hwp$"
        - "^application/haansofthwp$"

rateLimits:
  fileUploads:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60
  conversationsImport:
    ipMax: 40
    ipWindowInMinutes: 60
    userMax: 25
    userWindowInMinutes: 60
