version: 1.3.9
cache: true

# ==============================================
# 웹 검색
# ==============================================
webSearch:
  searchProvider: "searxng"
  searxngInstanceUrl: "${SEARXNG_INSTANCE_URL}"
  safeSearch: 1

# ==============================================
# 엔드포인트
# ==============================================
endpoints:
  custom:
    - name: "LiteLLM"
      apiKey: "user_provided"
      userProvide: true
      baseURL: "http://litellm:8000/v1"
      models:
        default: ["ollama/qwen3.5:9b"]
        fetch: true
      titleConvo: true
      titleModel: "ollama/qwen3.5:9b"
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "KloudChat"
      iconURL: "https://ollama.com/public/ollama.png"

# ==============================================
# 인터페이스 설정
# ==============================================
registration:
  allowedDomains:
    - "dankook.ac.kr"

interface:
  modelSelect: true
  parameters: true
  presets: true
  prompts: true
  bookmarks: true
  multiConvo: true
  temporaryChat: true
  runCode: true
  webSearch: true
  fileSearch: true
  fileCitations: true
  agents:
    USE: false
    CREATE: false
    SHARE: false
    SHARE_PUBLIC: false
  mcpServers:
    USE: false
    CREATE: false
    SHARE: false
    SHARE_PUBLIC: false

# ==============================================
# 파일 설정
# ==============================================
fileConfig:
  serverFileSizeLimit: 100
  avatarSizeLimit: 4
  endpoints:
    default:
      fileLimit: 10
      fileSizeLimit: 25
    agents:
      fileLimit: 10
      fileSizeLimit: 25

# ==============================================
# 속도 제한
# ==============================================
rateLimits:
  fileUploads:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60
  conversationsImport:
    ipMax: 40
    ipWindowInMinutes: 60
    userMax: 25
    userWindowInMinutes: 60
