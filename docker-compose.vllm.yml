# vLLM stack — 메인 docker-compose.yml 과 라이프사이클 분리, GPU 노드에서 별도
# 기동. 메인 stack 입장에선 외부 OpenAI 호환 백엔드 (.env 의 VLLM_*_URL).
# 운영은 ./scripts/manage-vllm.sh.
#
# Profile:
#   default  vllm-gemma26 + vllm-bge-m3 (chat/artifact/image-brain 노드)
#   deep     vllm-qwen122b 단독 (Deep Research / Slide Studio, `--profile deep`)
#   coder    vllm-codernext 단독 (코더 전용 노드, chat 과 격리, `--profile coder`)
#
# 이미지 선택은 아키텍처별로 명시:
#   arm64 (GB10): default 의 `*-aarch64` 이미지를 그대로 사용.
#   amd64 (RTX4090/RTX5090/PRO5000/PRO6000): .env 의 VLLM_IMAGE 에 표준 amd64 vLLM
#     이미지 명시.
# RTX4090 은 FP4 미지원 → manage-vllm.sh up 이 VLLM_GEMMA26_DIR 을 AWQ-int4
# 변종으로 swap (그 외 노드의 기본 weights 는 NVFP4).
#
# Dockerfile.vllm: base image 위에 pytest layer 추가. install-vllm.sh 가 pull
# 직후 자동 rebuild (자세한 사유는 Dockerfile.vllm).

# 메인 stack 의 orphan 경고 회피용 별도 project name.
name: kloudchat-vllm

services:
  # chat + artifact + image-brain 통합 모델. 멀티모달(vision). single-stage
  # super-agent 의 CHAT_MODEL — 아티팩트 토글도 이 모델이 처리(별도 coder 라우팅
  # 없음).
  vllm-gemma26:
    container_name: vllm-gemma26
    image: ${VLLM_IMAGE:-vllm/vllm-openai:nightly-aarch64}
    # 모든 vLLM 서비스가 같은 ${VLLM_IMAGE} 공유 — build 정의는 여기 한 곳에만.
    # amd64 (cu129-nightly) 는 base image 의 pytest 누락이 dynamo 경로에서 fail
    # → pytest layer 필수. arm64 nightly 는 무해. install-vllm.sh 가 자동
    # rebuild. 자세한 사유는 Dockerfile.vllm.
    build:
      context: .
      dockerfile: Dockerfile.vllm
      args:
        BASE_IMAGE: ${VLLM_IMAGE:-vllm/vllm-openai:nightly-aarch64}
    restart: unless-stopped
    ipc: host
    # command 는 list 형식 — YAML `>-` flow 가 JSON 인자의 따옴표를 먹는 함정 회피.
    command:
      - --model
      - /model
      - --served-model-name
      - local/gemma-4-26b
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --max-model-len
      - "${VLLM_GEMMA26_MAX_LEN:-16384}"
      - --gpu-memory-utilization
      - "${VLLM_GEMMA26_GPU_UTIL:-0.45}"
      - --kv-cache-dtype
      - fp8
      # 멀티모달(vision) mm-budget 확보 — multimodal 입력엔 batched-tokens >= 16384 필요.
      - --max-num-batched-tokens
      - "${VLLM_GEMMA26_MAX_BATCHED_TOKENS:-16384}"
      # gemma4 parser matches Gemma-4 chat-template tool-call output.
      # NOTE: gemma 는 reasoning 모델이 아님 — 절대 --reasoning-parser 금지.
      - --enable-auto-tool-choice
      - --tool-call-parser
      - gemma4
      - --trust-remote-code
      # DO NOT add --enforce-eager — CUDA graph capture 까지 off → decode throughput
      # 4× 손실. Dockerfile.vllm 의 pytest layer 로 대체.
    volumes:
      - ${VLLM_MODELS_ROOT:-/var/lib/vllm/models}/${VLLM_GEMMA26_DIR:-gemma-4-26b}:/model:ro
    ports:
      - "8001:8000"
    environment:
      HF_TOKEN: ${HF_TOKEN}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/v1/models || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      # 26b weight load + torch.compile + KV profiling 첫 startup ~5-7분.
      start_period: 600s

  # Deep Research / Slide Studio 모델 (Qwen3.5-122B-A10B MoE, NVFP4). chat 노드와 격리 —
  # profiles:[deep]. reasoning 모델 → --reasoning-parser qwen3 로 <think> 분리.
  vllm-qwen122b:
    profiles: [deep]
    container_name: vllm-qwen122b
    image: ${VLLM_IMAGE:-vllm/vllm-openai:nightly-aarch64}
    restart: unless-stopped
    ipc: host
    command:
      - --model
      - /model
      - --served-model-name
      - local/qwen3.5:122b
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --max-model-len
      - "${VLLM_QWEN122B_MAX_LEN:-131072}"
      - --gpu-memory-utilization
      - "${VLLM_QWEN122B_GPU_UTIL:-0.90}"
      - --kv-cache-dtype
      - fp8
      - --max-num-batched-tokens
      - "${VLLM_QWEN122B_MAX_BATCHED_TOKENS:-16384}"
      # qwen3_xml parser matches Qwen3.5 chat-template tool-call output.
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_xml
      # qwen3 reasoning-parser routes <think>...</think> into reasoning_content
      # instead of leaking it into the visible content stream.
      - --reasoning-parser
      - qwen3
      - --trust-remote-code
    volumes:
      - ${VLLM_MODELS_ROOT:-/var/lib/vllm/models}/${VLLM_QWEN122B_DIR:-qwen3.5-122b-a10b}:/model:ro
    ports:
      - "8002:8000"
    environment:
      HF_TOKEN: ${HF_TOKEN}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/v1/models || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      # 122b weight load + torch.compile + KV profiling 첫 startup ~6-8분.
      start_period: 600s

  vllm-bge-m3:
    container_name: vllm-bge-m3
    image: ${VLLM_IMAGE:-vllm/vllm-openai:nightly-aarch64}
    restart: unless-stopped
    ipc: host
    command:
      - --model
      - /model
      - --served-model-name
      - bge-m3
      - --runner
      - pooling
      - --convert
      - embed
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --gpu-memory-utilization
      - "${VLLM_BGE_M3_GPU_UTIL:-0.05}"
      - --trust-remote-code
    volumes:
      - ${VLLM_MODELS_ROOT:-/var/lib/vllm/models}/bge-m3:/model:ro
    ports:
      - "8004:8000"
    environment:
      HF_TOKEN: ${HF_TOKEN}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/v1/models || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  # coding assist 전용 (litellm-등록, LibreChat UI/agent 에서 숨김). 외부 코딩 클라이언트
  # (Claude Code / Codex) 용. chat 노드와 격리. qwen3_coder parser 가 Qwen3-Coder
  # chat template 와 매칭 — tool-call 정확도에 필수.
  vllm-codernext:
    profiles: [coder]
    container_name: vllm-codernext
    image: ${VLLM_IMAGE:-vllm/vllm-openai:nightly-aarch64}
    restart: unless-stopped
    ipc: host
    command:
      - --model
      - /model
      - --served-model-name
      - local/qwen3-coder-next
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --max-model-len
      - "${VLLM_CODERNEXT_MAX_LEN:-32768}"
      - --gpu-memory-utilization
      - "${VLLM_CODERNEXT_GPU_UTIL:-0.80}"
      - --kv-cache-dtype
      - fp8
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --default-chat-template-kwargs
      - '{"enable_thinking": false}'
      - --trust-remote-code
    volumes:
      - ${VLLM_MODELS_ROOT:-/var/lib/vllm/models}/${VLLM_CODERNEXT_DIR:-qwen3-coder-next}:/model:ro
    ports:
      - "8003:8000"
    environment:
      HF_TOKEN: ${HF_TOKEN}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/v1/models || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      # 80B MoE weight + cudagraph 첫 startup ~6분.
      start_period: 600s
